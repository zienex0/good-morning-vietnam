name: flutter_foundation_kit
description: "An opinionated source-first Flutter framework for predictable feature, data, state, and UI work."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  freezed_annotation: ^3.0.0
  go_router: ^14.0.0
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0
  intl: ^0.20.2
  riverpod_annotation: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  mocktail: ^1.0.0
  riverpod_generator: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GoogleSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/GoogleSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/GoogleSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-BoldItalic.ttf
          weight: 700
          style: italic
